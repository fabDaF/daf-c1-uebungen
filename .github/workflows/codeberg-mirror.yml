name: Mirror to Codeberg

# Spiegelt jeden Push (Branches + Tags) nach codeberg.org/fabbuLos/<repo>.
# Lebensversicherung gegen einseitige GitHub-Account-Sperre.
#
# Voraussetzungen (einmalig in Repo-Settings -> Secrets and variables -> Actions):
#   CODEBERG_USERNAME  -> fabbuLos
#   CODEBERG_TOKEN     -> Codeberg-Access-Token mit write:repository-Scope
#
# WICHTIG ggue. der alten Version:
#   * KEIN  `git push --mirror` mehr. --mirror wollte bei jedem Lauf den
#     Codeberg-eigenen `pages`-Branch loeschen (existiert nur auf Codeberg,
#     nicht auf GitHub). Diese Loeschung wurde abgelehnt -> Push-Exit 1 ->
#     "Run failed"-Mail bei JEDEM Push, obwohl der Inhalt laengst gespiegelt war.
#   * Stattdessen explizite, NICHT-destruktive Refspecs: heads + tags werden
#     ge-pusht (force), aber nichts wird auf Codeberg geloescht. `pages`
#     ueberlebt.
#   * Default-Branch wird dynamisch ermittelt (main ODER master), damit die
#     Datei in jedem Repo unveraendert laeuft.

on:
  push:
    branches: ['**']
    tags: ['**']
  workflow_dispatch:

concurrency:
  group: codeberg-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Mirror to Codeberg
        env:
          CB_USER: ${{ secrets.CODEBERG_USERNAME }}
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${CB_USER:-}" ] || [ -z "${CB_TOKEN:-}" ]; then
            echo "::error::Secrets CODEBERG_USERNAME und CODEBERG_TOKEN fehlen"
            exit 1
          fi

          REPO_NAME=$(basename "${{ github.repository }}")
          CB_URL="https://${CB_USER}:${CB_TOKEN}@codeberg.org/${CB_USER}/${REPO_NAME}.git"

          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          [ -z "${DEFAULT_BRANCH}" ] && DEFAULT_BRANCH=main

          echo "::group::Bare-Clone aus GitHub"
          git clone --bare "https://github.com/${{ github.repository }}.git" work
          cd work
          echo "::endgroup::"

          # retry "<Label>" cmd...  ->  5 Versuche mit Backoff 30/60/90/120s.
          retry() {
            local label="$1"; shift
            local d
            for attempt in 1 2 3 4 5; do
              echo "::group::${label} (Versuch ${attempt}/5)"
              if "$@"; then
                echo "::endgroup::"
                echo "${label}: ok (Versuch ${attempt})."
                return 0
              fi
              echo "::endgroup::"
              if [ "${attempt}" -lt 5 ]; then
                d=$((attempt * 30))
                echo "::warning::${label} Versuch ${attempt}/5 fehlgeschlagen — warte ${d}s und versuche erneut."
                sleep "${d}"
              fi
            done
            echo "::error::${label} nach 5 Versuchen fehlgeschlagen (vermutlich Codeberg-Ausfall) — naechster Push triggert neuen Lauf."
            return 1
          }

          # 1) Alle Branches + Tags spiegeln. Force ja, Loeschen NEIN
          #    (kein refs/heads/* -> :refs/heads/* Delete von remote-only refs wie pages).
          retry "push branches+tags" \
            git push --force "${CB_URL}" "refs/heads/*:refs/heads/*" "refs/tags/*:refs/tags/*"

          # 2) Codeberg-Pages-Branch dem Default-Branch nachfuehren.
          retry "push pages" \
            git push --force "${CB_URL}" "refs/heads/${DEFAULT_BRANCH}:refs/heads/pages"
